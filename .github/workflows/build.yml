name: Build APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            autoconf automake autopoint libtool pkg-config \
            gettext build-essential ccache git \
            libffi-dev libssl-dev libltdl-dev \
            zlib1g-dev libncurses5-dev libnss3-dev \
            libreadline-dev wget lld zip unzip \
            openjdk-17-jdk

      - name: Pastikan Python 3.11 jadi default sistem
        run: |
          PYPATH=$(which python)
          echo "Python path: $PYPATH"
          python --version
          # Paksa semua python3 mengarah ke 3.11
          sudo ln -sf $PYPATH /usr/local/bin/python3
          sudo ln -sf $PYPATH /usr/bin/python3
          python3 --version
          python3 -c "import cgi; print('cgi OK')"

      - name: Install buildozer + p4a
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.37
          pip install buildozer==1.5.0
          pip install git+https://github.com/kivy/python-for-android.git@v2023.09.16

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-v2023-${{ github.run_id }}

      - name: Build APK
        run: |
          yes y | buildozer -v android debug 2>&1 | tee build.log
          echo "=== Cari APK ==="
          find . -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BTC-SMC-ICT-Engine-APK
          path: "**/*.apk"
          retention-days: 30
          if-no-files-found: warn

      - name: Upload log jika gagal
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-error
          path: build.log
          retention-days: 7
