name: Build APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            autoconf automake autopoint libtool pkg-config \
            gettext build-essential ccache git \
            libffi-dev libssl-dev libltdl-dev \
            zlib1g-dev libncurses5-dev libnss3-dev \
            libreadline-dev wget lld zip unzip \
            openjdk-17-jdk

      - name: Install buildozer + p4a develop
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.37
          pip install buildozer
          pip install git+https://github.com/kivy/python-for-android.git@develop

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-develop-${{ github.run_id }}

      - name: Build APK
        run: |
          yes y | buildozer -v android debug 2>&1 | tee build.log

      - name: Cari APK di semua lokasi
        run: |
          echo "=== Cari APK di seluruh sistem ==="
          find / -name "*.apk" 2>/dev/null | grep -v "proc\|sys\|dev"
          echo "=== Cari di .buildozer ==="
          find .buildozer -name "*.apk" 2>/dev/null || echo "tidak ada di .buildozer"
          echo "=== Cari di bin ==="
          find bin -name "*.apk" 2>/dev/null || echo "tidak ada di bin"
          echo "=== Cari di home runner ==="
          find /home/runner -name "*.apk" 2>/dev/null || echo "tidak ada"

      - name: Upload APK dari semua lokasi
        uses: actions/upload-artifact@v4
        with:
          name: BTC-SMC-ICT-Engine-APK
          path: |
            **/*.apk
            .buildozer/**/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
