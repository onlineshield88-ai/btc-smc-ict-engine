name: Build APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Briefcase
        run: pip install briefcase

      - name: Build APK
        run: |
          briefcase create android
          briefcase build android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BTC-SMC-ICT-Engine-APK
          path: "**/*.apk"
          retention-days: 30

      - name: Upload log jika gagal
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-error
          path: "**/*.log"
          retention-days: 7
