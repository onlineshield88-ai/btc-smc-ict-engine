name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Java
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk zip unzip

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 Cython==0.29.36

      - name: Clean
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer

      - name: Build APK
        run: |
          set -eo pipefail
          buildozer android debug | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: |
            bin/*.apk
            **/*.apk

      - name: Upload Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
