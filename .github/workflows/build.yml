name: Build APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            autoconf automake autopoint libtool pkg-config \
            gettext build-essential ccache git \
            libffi-dev libssl-dev libltdl-dev \
            zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev \
            libreadline-dev wget lld zip unzip \
            cmake ninja-build \
            openjdk-17-jdk

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.37 virtualenv

      - name: Cache buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Build APK
        run: |
          yes y | buildozer -v android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BTC-SMC-ICT-Engine-APK
          path: "**/*.apk"
          retention-days: 30

      - name: Upload log jika gagal
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-error
          path: "**/*.log"
          retention-days: 7
