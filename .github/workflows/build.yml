name: Build APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libffi-dev libssl-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install \
            buildozer==1.4.0 \
            cython==0.29.36 \
            virtualenv==20.24.7

      - name: Clean Cache
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer

      - name: Build APK
        shell: bash
        run: |
          set -eo pipefail
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BTC-SMC-ICT-Engine-APK
          path: |
            bin/*.apk
            **/*.apk

      - name: Upload Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
