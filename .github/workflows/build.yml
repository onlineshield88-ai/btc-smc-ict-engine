name: Build APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libffi-dev libssl-dev

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Clean Build Cache
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install \
            buildozer==1.4.0 \
            cython==0.29.36 \
            setuptools==69.5.1 \
            wheel==0.42.0 \
            virtualenv==20.24.7

      - name: Build APK
        shell: bash
        run: |
          set -eo pipefail
          yes y | buildozer -v android debug 2>&1 | tee build.log

          echo ""
          echo "=== APK FILES ==="
          find . -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BTC-SMC-ICT-Engine-APK
          path: |
            bin/*.apk
            **/*.apk

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
